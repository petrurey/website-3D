<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YOUR NAME — 3D Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f5f4f0;
      --gray: #888;
      --light-gray: #ddd;
      --accent: #0a0a0a;
    }

    html { font-size: 16px; }

    body {
      background: var(--white);
      color: var(--black);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */

    header {
      padding: 2rem 2.5rem 1.5rem;
      border-bottom: 1px solid var(--black);
    }

    .header-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 2rem;
      align-items: start;
    }

    .name-block h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 12vw, 11rem);
      line-height: 0.9;
      letter-spacing: -0.01em;
      color: var(--black);
    }

    .header-meta {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0 2rem;
      padding-top: 0.5rem;
      align-items: start;
    }

    .clock-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .clock-svg {
      width: 110px;
      height: 110px;
    }

    .clock-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--gray);
      letter-spacing: 0.04em;
      text-align: center;
    }

    .bio {
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--black);
      grid-column: 1;
    }



    .header-bottom {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--light-gray);
      font-size: 0.78rem;
      font-family: 'DM Mono', monospace;
    }

    .tagline { color: var(--gray); }

    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--black);
      text-decoration: none;
      border: 1px solid currentColor;
      padding: 0.2rem 0.6rem;
      transition: background 0.15s, color 0.15s;
    }

    .contact-link:hover {
      background: var(--black);
      color: var(--white);
    }

    /* ── GRID ── */
    main {
      padding: 0 2.5rem 4rem;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      border-left: 1px solid var(--black);
    }

    .project-card {
      border-right: 1px solid var(--black);
      border-bottom: 1px solid var(--black);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .project-image {
      width: 100%;
      aspect-ratio: 4/5;
      overflow: hidden;
      position: relative;
      background: #e8e6e0;
    }

    .project-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.4s;
      filter: grayscale(0%);
    }

    .project-card:hover .project-image img {
      transform: scale(1.04);
    }

    /* placeholder when no image */
    .placeholder-img {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e0ddd7;
      object-position: 100% 100%;  
    }

    .placeholder-img svg {
      width: 48px;
      height: 48px;
      opacity: 0.2;
    }

    .project-info {
      padding: 1.2rem 1.4rem 1.6rem;
      border-top: 1px solid var(--black);
    }

    .project-title {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 1rem;
      line-height: 1.3;
      margin-bottom: 0.4rem;
    }

    .project-subtitle {
      font-family: 'DM Sans', sans-serif;
      font-style: italic;
      font-weight: 300;
      font-size: 0.82rem;
      line-height: 1.55;
      color: var(--gray);
    }

    /* hover overlay */
    .project-overlay {
      position: absolute;
      inset: 0;
      background: var(--black);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .project-card:hover .project-overlay {
      opacity: 0.06;
    }

    /* ── FOOTER ── */
    footer {
      padding: 1.2rem 2.5rem;
      border-top: 1px solid var(--black);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--gray);
    }



    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .name-block { animation: fadeUp 0.7s ease both; }
    .header-meta { animation: fadeUp 0.7s 0.1s ease both; }
    .header-bottom { animation: fadeUp 0.7s 0.2s ease both; }

    .project-card {
      animation: fadeUp 0.6s ease both;
    }
    .project-card:nth-child(1) { animation-delay: 0.3s; }
    .project-card:nth-child(2) { animation-delay: 0.42s; }
    .project-card:nth-child(3) { animation-delay: 0.54s; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .header-top { grid-template-columns: 1fr; }
      .header-meta { grid-template-columns: 1fr; max-width: 100%; }
      .locations { grid-column: 1; margin-top: 1rem; }
      .projects-grid { grid-template-columns: 1fr; }
      .header-bottom { flex-wrap: wrap; gap: 0.8rem; }
    }
  </style>
</head>
